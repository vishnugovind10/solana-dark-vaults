version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /agent-coordinator
    schedule:
      interval: weekly
    groups:
      coordinator-dependencies:
        patterns: ["*"]
    ignore:
      - dependency-name: "@types/node"
        versions: [">=25"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: dtolnay/rust-toolchain
