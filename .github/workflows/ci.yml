name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  portable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: agent-coordinator/package-lock.json
      - run: cargo test --workspace --locked
      - run: cargo test --manifest-path arcium-circuits/Cargo.toml --locked
      - run: npm ci
        working-directory: agent-coordinator
      - run: npm run check
        working-directory: agent-coordinator
      - run: npm test
        working-directory: agent-coordinator
      - run: npm run coverage
        working-directory: agent-coordinator
      - run: ./scripts/demo.sh
      - run: ./scripts/verify-docs.sh
